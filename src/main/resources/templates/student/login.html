<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Online Exam Portal</title>
    <!-- Fragments Styles -->
    <th:block th:replace="~{fragments/footer :: styles}"></th:block>
</head>
<body class="bg-light">

    <!-- Public Navbar -->
    <div th:replace="~{fragments/navbar :: navbar-public}"></div>

    <!-- Login Container -->
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh; padding-top: 6rem; padding-bottom: 3rem;">
        <div class="card auth-card p-4 p-md-5 w-100" style="max-width: 480px;">
            <div class="text-center mb-4">
                <div class="bg-primary text-white rounded-3 d-inline-flex align-items-center justify-content-center mb-3" style="width: 50px; height: 50px;">
                    <i class="fas fa-sign-in-alt fs-4"></i>
                </div>
                <h3 class="fw-bold mb-1 text-dark">Welcome Back</h3>
                <p class="text-gray-500" style="font-size: 0.95rem;">Access your dashboard to view active exams and check results.</p>
            </div>
            
            <!-- Global error display (Thymeleaf placeholder for invalid logins) -->
            <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show rounded-3 mb-4" role="alert">
                <i class="fas fa-exclamation-triangle me-2"></i>
                <span>Invalid email or password. Please try again.</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            
            <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show rounded-3 mb-4" role="alert">
                <i class="fas fa-check-circle me-2"></i>
                <span>You have successfully signed out. See you again!</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            
            <form th:action="@{/student/login}" action="/student/dashboard.html" method="POST" class="needs-validation" novalidate>
                
                <!-- Email Address -->
                <div class="form-floating mb-3">
                    <input type="email" class="form-control rounded-3" id="email" name="email" placeholder="name@example.com" required>
                    <label for="email">Email Address</label>
                    <div class="invalid-feedback">
                        Please enter a valid email address.
                    </div>
                </div>
                
                <!-- Password -->
                <div class="form-floating mb-3">
                    <input type="password" class="form-control rounded-3" id="password" name="password" placeholder="Password" required>
                    <label for="password">Password</label>
                    <div class="invalid-feedback">
                        Please enter your password.
                    </div>
                </div>
                
                <!-- Extra Action Links -->
                <div class="d-flex align-items-center justify-content-between mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe" name="rememberMe">
                        <label class="form-check-label text-gray-500" for="rememberMe" style="font-size: 0.85rem;">Remember Me</label>
                    </div>
                    <a href="#" class="text-primary text-decoration-none fw-semibold" style="font-size: 0.85rem;">Forgot Password?</a>
                </div>
                
                <!-- Login Submission Button -->
                <button class="btn btn-primary btn-lg w-100 py-2.5 rounded-3 mb-3 fw-semibold" type="submit">
                    Sign In <i class="fas fa-arrow-right ms-1"></i>
                </button>
                
                <div class="text-center mt-3">
                    <span class="text-gray-500" style="font-size: 0.9rem;">New student? </span>
                    <a th:href="@{/student/register}" href="register.html" class="fw-bold text-primary text-decoration-none" style="font-size: 0.9rem;">Create Account</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts Fragment -->
    <th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
