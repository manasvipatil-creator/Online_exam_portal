<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Examination - Online Exam Portal</title>
    <!-- Fragments Styles -->
    <th:block th:replace="~{fragments/footer :: styles}"></th:block>
</head>
<body class="bg-light">

    <!-- Exam Portal Compact Top Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container-fluid px-md-5">
            <div class="d-flex align-items-center gap-2 text-white">
                <div class="bg-primary text-white d-flex align-items-center justify-content-center rounded-3" style="width: 34px; height: 34px;">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <span class="fw-bold fs-5 tracking-wide">EXAMPORTAL</span>
            </div>
            
            <div class="d-flex align-items-center gap-4 text-white ms-auto">
                <div class="vr bg-white opacity-20 d-none d-md-block" style="height: 30px;"></div>
                <div class="d-none d-md-flex align-items-center gap-2">
                    <i class="far fa-user text-gray-400"></i>
                    <span class="fw-semibold" th:text="${session.username}" text="Sam Parker">Sam Parker</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Exam Interface -->
    <div class="container-fluid px-md-5 py-4">
    
        <form th:action="@{/student/exam/submit}" action="/student/result.html" method="POST" id="examForm">
            <!-- Hidden inputs to track exam details in Spring Boot -->
          <input type="hidden"
       name="questionId"
       th:value="${questionList[currentIndex].id}">
            <input type="hidden" name="studentId" th:value="${studentId}" value="202">
            
            <div class="row g-4">
                <!-- LEFT COLUMN: QUESTION CONTENT & CONTROLS -->
                <div class="col-lg-8">
                    <!-- Progress Bar Header -->
                    <div class="card card-premium p-4 border-0 mb-4 bg-white">
                        <div class="d-flex align-items-center justify-content-between mb-2">
                            <span class="fw-bold text-dark">Overall Exam Progress</span>
                            <span class="text-primary fw-bold" id="progress-percent">20% Done</span>
                        </div>
                        <div class="progress rounded-pill" style="height: 10px;">
                            <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary" role="progressbar" style="width: 20%;" aria-valuenow="20" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                    </div>
                    
                    <!-- Main Active Question Container -->
                    <div class="card card-premium p-4 p-md-5 border-0 mb-4 bg-white" style="min-height: 400px; display: flex; flex-direction: column; justify-content: space-between;">
                        <!-- Question Header -->
<div>
  <div class="d-flex align-items-center justify-content-between mb-4">

    <span class="badge bg-primary-light text-primary rounded-pill px-3 py-1.5 fw-semibold">
        Question <span th:text="${currentIndex + 1}"></span>
        of
        <span th:text="${questionList.size()}"></span>
    </span>

    <span class="text-gray-400 fw-semibold">
        <i class="fas fa-bookmark me-1 text-warning"></i>
        2 Marks
    </span>

</div>

    <!-- Debug -->
    <h6 style="color:red" th:text="'Total Questions = ' + ${questionList.size()}"></h6>

    <!-- Question Text -->
    <h4 class="fw-bold text-dark mb-4"
        style="line-height: 1.5;"
        th:if="${questionList != null and !questionList.isEmpty()}"
        th:text="${questionList[currentIndex].questionText}">
        Question Text
    </h4>
    <input type="hidden"
       name="questionId"
       th:value="${questionList[currentIndex].id}">

<input type="hidden"
       name="examId"
       th:value="${examId}">
    

    <!-- MCQ Options -->
    <div class="options-container mb-4">

        <!-- Option A -->
        <div class="mcq-option">
          <input type="radio"
       id="optA"
       name="selectedAnswer"
       value="A"
       th:checked="${selectedAnswer == 'A'}">
            <label class="mb-0 fw-semibold text-dark w-100"
                   for="optA"
                   th:text="'A) ' + ${questionList[currentIndex].optionA}">
                Option A
            </label>
        </div>

        <!-- Option B -->
        <div class="mcq-option">
          <input type="radio"
       id="optB"
       name="selectedAnswer"
       value="B"
       th:checked="${selectedAnswer == 'B'}">
            <label class="mb-0 fw-semibold text-dark w-100"
                   for="optB"
                   th:text="'B) ' + ${questionList[currentIndex].optionB}">
                Option B
            </label>
        </div>

        <!-- Option C -->
        <div class="mcq-option">
           <input type="radio"
       id="optC"
       name="selectedAnswer"
       value="C"
       th:checked="${selectedAnswer == 'C'}">
            <label class="mb-0 fw-semibold text-dark w-100"
                   for="optC"
                   th:text="'C) ' + ${questionList[currentIndex].optionC}">
                Option C
            </label>
        </div>

        <!-- Option D -->
        <div class="mcq-option">
          <input type="radio"
       id="optD"
       name="selectedAnswer"
       value="D"
       th:checked="${selectedAnswer == 'D'}">
            <label class="mb-0 fw-semibold text-dark w-100"
                   for="optD"
                   th:text="'D) ' + ${questionList[currentIndex].optionD}">
                Option D
            </label>
        </div>

    </div>
</div>
                        
                        <!-- Navigation Action Buttons inside Card -->
              <div class="d-flex align-items-center justify-content-between border-top border-gray-100 pt-4">

  
   

    <!-- Mark -->
    <button type="button"
            class="btn btn-outline-warning px-3 py-2 rounded-3">
        <i class="far fa-bookmark me-1"></i> Mark for Review
    </button>

    <!-- Next -->
  <button th:if="${currentIndex < questionList.size()-1}"
        type="submit"
        formaction="/student/exam/save"
        name="nextIndex"
        th:value="${currentIndex+1}"
        class="btn btn-primary">
    Save & Next
</button>

  <!-- Previous -->
<button th:if="${currentIndex > 0}"
        type="submit"
        formaction="/student/exam/previous"
        name="prevIndex"
        th:value="${currentIndex-1}"
        class="btn btn-secondary">
    Previous
</button>
    <!-- Submit -->
   <button th:if="${currentIndex == questionList.size()-1}"
        type="submit"
        class="btn btn-success px-4 py-2 rounded-3">
    Submit Exam
</button>

</div>
                
                <!-- RIGHT COLUMN: PROCTORED METRICS PANEL (Timer & Navigator) -->
                <div class="col-lg-4">
                    <!-- Timer Widget -->
                    <div class="card card-premium p-4 border-0 mb-4 bg-white text-center">
                        <small class="text-gray-500 fw-bold uppercase tracking-wider d-block mb-2">Remaining Duration</small>
                        
                        <!-- The timer display will be populated and handled via static duration attr in app.js -->
                        <div class="timer-container mx-auto mb-3" style="width: max-content;">
                            <i class="far fa-clock"></i>
                            <span id="exam-timer" data-duration="45" th:data-duration="${examDurationMinutes}">45:00</span>
                        </div>
                        
                        <!-- Timer visual sub-progress bar -->
                        <div class="progress rounded-pill mb-2" style="height: 6px;">
                            <div class="progress-bar bg-success" id="timer-progress-bar" role="progressbar" style="width: 100%;" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                        <small class="text-danger-light bg-danger text-danger px-2.5 py-1 rounded-pill d-inline-block fw-semibold mx-auto" style="font-size: 0.75rem;">
                            ⚠️ Exam autosubmits when timer runs out
                        </small>
                    </div>
                    
                    <!-- Question Index Navigator Widget -->
                    <div class="card card-premium p-4 border-0 mb-4 bg-white">
                        <h5 class="fw-bold text-dark mb-3">Question Index</h5>
                        
                        <div class="d-flex flex-wrap mb-4">
                            <!-- Question Buttons -->
                            <button type="button" id="q-nav-1" class="question-nav-btn current">1</button>
                            <button type="button" id="q-nav-2" class="question-nav-btn">2</button>
                            <button type="button" id="q-nav-3" class="question-nav-btn">3</button>
                            <button type="button" id="q-nav-4" class="question-nav-btn">4</button>
                            <button type="button" id="q-nav-5" class="question-nav-btn">5</button>
                        </div>
                        
                        <!-- Navigator Legend -->
                        <div class="border-top border-gray-100 pt-3" style="font-size: 0.8rem;">
                            <h6 class="fw-bold text-dark mb-2" style="font-size: 0.85rem;">Navigator Legend</h6>
                            <div class="row g-2">
                                <div class="col-6 d-flex align-items-center gap-2">
                                    <span class="d-inline-block bg-primary rounded-1" style="width: 14px; height: 14px;"></span>
                                    <span class="text-gray-500">Current Question</span>
                                </div>
                                <div class="col-6 d-flex align-items-center gap-2">
                                    <span class="d-inline-block bg-success rounded-1" style="width: 14px; height: 14px;"></span>
                                    <span class="text-gray-500">Answered</span>
                                </div>
                                <div class="col-6 d-flex align-items-center gap-2">
                                    <span class="d-inline-block bg-warning rounded-1" style="width: 14px; height: 14px;"></span>
                                    <span class="text-gray-500">Marked Review</span>
                                </div>
                                <div class="col-6 d-flex align-items-center gap-2">
                                    <span class="d-inline-block border border-gray-300 rounded-1" style="width: 14px; height: 14px;"></span>
                                    <span class="text-gray-500">Unvisited</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Terminate / Complete Submission Card -->
                    <div class="card card-premium p-4 border-0 text-center bg-white">
                        <p class="text-gray-400 mb-3" style="font-size: 0.85rem;">Are you absolutely finished checking all of your answers?</p>
                        <button type="submit"
     					   class="btn btn-success w-100 py-3 rounded-3 fw-bold">
						  Submit Examination
							</button>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <!-- Scripts Fragment -->
    <th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
