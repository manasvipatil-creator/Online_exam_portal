<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Online Exam Portal</title>
    <!-- Fragments Styles -->
    <th:block th:replace="~{fragments/footer :: styles}"></th:block>
</head>
<body>

    <!-- Public Navbar -->
    <div th:replace="~{fragments/navbar :: navbar-public}"></div>

    <!-- Error Dashboard Panel -->
    <div class="error-container">
        <div class="card error-card border-0">
            <div class="error-code">404</div>
            <h3 class="fw-bold mb-3 text-dark">Oops! Page Not Found</h3>
            <p class="text-gray-500 mb-4" style="line-height: 1.6;">
                The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Please verify your URL query or return to your dashboard.
            </p>
            <div class="d-flex flex-wrap gap-2 justify-content-center">
                <a th:href="@{/}" href="/" class="btn btn-primary px-4 py-2.5 rounded-3 fw-semibold">
                    <i class="fas fa-home me-1"></i> Back to Home
                </a>
                <a th:href="@{/student/dashboard}" href="student/dashboard.html" class="btn btn-outline-primary px-4 py-2.5 rounded-3 fw-semibold">
                    Go to Dashboard <i class="fas fa-arrow-right ms-1"></i>
                </a>
            </div>
        </div>
    </div>

    <!-- Scripts Fragment -->
    <th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
