
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Details</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f7fc;
        }

        .profile-card{
            max-width:700px;
            margin:50px auto;
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        .profile-header{
            background:linear-gradient(135deg,#4f46e5,#6366f1);
            color:white;
            padding:40px;
            text-align:center;
        }

        .avatar{
            width:90px;
            height:90px;
            border-radius:50%;
            background:white;
            color:#4f46e5;
            font-size:32px;
            font-weight:bold;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:auto;
            margin-bottom:15px;
        }

        .detail-row{
            padding:15px 25px;
            border-bottom:1px solid #eee;
        }

        .detail-label{
            font-weight:600;
            color:#6b7280;
        }

        .detail-value{
            font-weight:500;
            color:#111827;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card profile-card">

        <div class="profile-header">

            <div class="avatar"
                 th:text="${#strings.substring(student.fullName,0,1)}">
                M
            </div>

            <h3 th:text="${student.fullName}">
                Student Name
            </h3>

            <p class="mb-0">Student Profile</p>

        </div>

        <div class="card-body p-0">

            <div class="detail-row d-flex justify-content-between">
                <span class="detail-label">Student ID</span>
                <span class="detail-value"
                      th:text="${student.id}">
                </span>
            </div>

            <div class="detail-row d-flex justify-content-between">
                <span class="detail-label">Full Name</span>
                <span class="detail-value"
                      th:text="${student.fullName}">
                </span>
            </div>

            <div class="detail-row d-flex justify-content-between">
                <span class="detail-label">Email Address</span>
                <span class="detail-value"
                      th:text="${student.email}">
                </span>
            </div>

            <div class="detail-row d-flex justify-content-between">
                <span class="detail-label">Mobile Number</span>
                <span class="detail-value"
                      th:text="${student.mobileNumber}">
                </span>
            </div>

        </div>

        <div class="card-footer bg-white text-center border-0 p-4">

            <a th:href="@{/admin/manage-students}"
               class="btn btn-primary px-4">
                ← Back to Students
            </a>

        </div>

    </div>

</div>

</body>
</html>
```
